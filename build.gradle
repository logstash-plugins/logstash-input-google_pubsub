import java.nio.file.Files
import java.nio.file.Paths
import static java.nio.file.StandardCopyOption.REPLACE_EXISTING

plugins {
  id 'java'
  id 'idea'
  id 'maven-publish'
}

group "org.logstash.inputs"
version Files.readAllLines(Paths.get("version")).first()

def pubsubVersion = '1.143.1'

repositories {
    mavenCentral()
}

dependencies {
    // Core dependency - transitive dependencies except constraints are automatically resolved
    implementation "com.google.cloud:google-cloud-pubsub:${pubsubVersion}"
}

task generateGemJarRequiresFile {
    doLast {
        File jars_file = file("lib/logstash-input-google_pubsub_jars.rb")
        jars_file.newWriter().withWriter { w ->
            w << "# AUTOGENERATED BY THE GRADLE SCRIPT. DO NOT EDIT.\n\n"
            w << "require \'jar_dependencies\'\n"
            configurations.runtimeClasspath.incoming.artifacts.artifacts.each { artifact ->
                def id = artifact.id.componentIdentifier
                if (id instanceof org.gradle.api.artifacts.component.ModuleComponentIdentifier) {
                    w << "require_jar(\'${id.group}\', \'${id.module}\', \'${id.version}\')\n"
                }
            }

            w << "require_jar(\'${project.group}\', \'${project.name}\', \'${project.version}\')\n"
        }
    }
}

task vendor {
    doLast {
        String vendorPathPrefix = "vendor/jar-dependencies"
        configurations.runtimeClasspath.incoming.artifacts.artifacts.each { artifact ->
            def id = artifact.id.componentIdentifier
            if (id instanceof org.gradle.api.artifacts.component.ModuleComponentIdentifier) {
                String group = id.group
                String name = id.module
                String version = id.version
                String groupPath = group.replaceAll('\\.', '/')
                File newJarFile = file("${vendorPathPrefix}/${groupPath}/${name}/${version}/${name}-${version}.jar")
                if (!newJarFile.parentFile.exists()) {
                    newJarFile.parentFile.mkdirs()
                }
                Files.copy(artifact.file.toPath(), newJarFile.toPath(), REPLACE_EXISTING)
            }
        }

        // Copy the project jar into vendor/jar-dependencies
        String projectGroupPath = project.group.replaceAll('\\.', '/')
        File projectJarFile = file("${vendorPathPrefix}/${projectGroupPath}/${project.name}/${project.version}/${project.name}-${project.version}.jar")
        projectJarFile.mkdirs()
        Files.copy(file("$buildDir/libs/${project.name}-${project.version}.jar").toPath(), projectJarFile.toPath(), REPLACE_EXISTING)
    }
}

task checkDependencyAlignment {
    description = 'Validates that gRPC and Protobuf dependency versions are consistently resolved'
    doLast {
        def resolved = [:]
        def declaredByPubsub = [:]

        configurations.runtimeClasspath.resolvedConfiguration.firstLevelModuleDependencies.each { dep ->
            if (dep.moduleGroup == 'com.google.cloud' && dep.moduleName == 'google-cloud-pubsub') {
                dep.children.each { child ->
                    declaredByPubsub["${child.moduleGroup}:${child.moduleName}"] = child.moduleVersion
                }
            }
        }

        configurations.runtimeClasspath.resolvedConfiguration.resolvedArtifacts.each { artifact ->
            def id = artifact.moduleVersion.id
            resolved["${id.group}:${id.name}"] = id.version
        }

        def grpcVersions = resolved.findAll { it.key.startsWith('io.grpc:grpc-') }
        def uniqueGrpcVersions = grpcVersions.collect { it.value }.unique()
        def protobufVersions = resolved.findAll { it.key.startsWith('com.google.protobuf:') }

        println "\n--- Dependency Alignment Report ---"

        println "\ngoogle-cloud-pubsub declares:"
        declaredByPubsub.findAll { it.key.startsWith('io.grpc:grpc-') }.sort().each { k, v ->
            def actual = resolved[k]
            def status = (v == actual) ? '(aligned)' : "(OVERRIDDEN: resolved to ${actual})"
            println "  ${k} = ${v} ${status}"
        }

        println "\ngRPC modules resolved (${uniqueGrpcVersions.size()} unique version(s)):"
        grpcVersions.sort().each { k, v -> println "  ${k} = ${v}" }

        println "\nProtobuf modules resolved:"
        protobufVersions.sort().each { k, v -> println "  ${k} = ${v}" }

        if (uniqueGrpcVersions.size() > 1) {
            throw new GradleException(
                "gRPC version mismatch detected! Found versions: ${uniqueGrpcVersions}. " +
                "All gRPC modules must use the same version.")
        }

        def pubsubGrpc = declaredByPubsub.find { it.key == 'io.grpc:grpc-api' }?.value
        def resolvedGrpc = resolved['io.grpc:grpc-api']
        if (pubsubGrpc && resolvedGrpc && pubsubGrpc != resolvedGrpc) {
            logger.warn("WARNING: google-cloud-pubsub expects gRPC ${pubsubGrpc}, " +
                "but constraints force ${resolvedGrpc}. " +
                "Consider upgrading google-cloud-pubsub to a version that aligns with gRPC ${resolvedGrpc}.")
        }

        def protobufJavaVersion = protobufVersions['com.google.protobuf:protobuf-java']
        def protobufUtilVersion = protobufVersions['com.google.protobuf:protobuf-java-util']
        if (protobufJavaVersion && protobufUtilVersion && protobufJavaVersion != protobufUtilVersion) {
            throw new GradleException(
                "protobuf-java (${protobufJavaVersion}) and protobuf-java-util (${protobufUtilVersion}) " +
                "versions must match.")
        }

        println "\n--- All checks passed ---\n"
    }
}

vendor.dependsOn(jar, generateGemJarRequiresFile, checkDependencyAlignment)